{% extends 'base.html' %}
{% load static %}

{% block title %}Server Error - NCHSM{% endblock %}

{% block content %}

<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="text-center">
        <div class="display-1 fw-bold text-danger mb-3">500</div>
        <h1 class="fw-bold mb-3">Server Error</h1>

        <div class="d-flex gap-3 justify-content-center">
            <a href="{% url 'website:home' %}" class="btn btn-primary btn-lg">

            <a href="{% url 'website:contact' %}" class="btn btn-outline-primary btn-lg">

        </div>
    </div>

{% endblock %}
